<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Emergence Lab v1.2</title>
<style>
:root{--bg:#03070b;--panel:rgba(6,14,22,.82);--line:rgba(120,190,255,.22);--text:#e9f3ff;--muted:#8fa8bf;--green:#00ff9d;--blue:#25a5ff;--red:#ff4778;--yellow:#ffd166}
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif}canvas{display:block;width:100vw;height:100vh;background:#02060a;image-rendering:pixelated}.brand{position:fixed;top:14px;left:14px;padding:13px 16px;border:1px solid var(--line);border-radius:16px;background:var(--panel);backdrop-filter:blur(12px);box-shadow:0 18px 60px rgba(0,0,0,.42);z-index:3}.brand b{display:block;letter-spacing:.14em;font-size:12px}.brand span{display:block;color:var(--muted);font-size:12px;margin-top:4px}.hud{position:fixed;top:14px;right:14px;display:flex;gap:8px;z-index:3}.stat{min-width:78px;padding:11px 13px;border:1px solid var(--line);border-radius:15px;background:var(--panel);text-align:center;backdrop-filter:blur(12px)}.stat strong{display:block;color:var(--green);font-size:20px;line-height:1}.stat small{display:block;margin-top:6px;color:var(--muted);font-size:9px;letter-spacing:.15em}.panel{position:fixed;left:14px;top:118px;width:260px;max-height:calc(100vh - 150px);overflow:auto;padding:14px;border:1px solid var(--line);border-radius:18px;background:var(--panel);backdrop-filter:blur(12px);z-index:3;transition:.2s}.panel.hidden{transform:translateX(-285px)}h2{margin:0 0 14px;font-size:13px;color:#b9ffd8;letter-spacing:.16em}label{display:block;margin:13px 0 6px;color:var(--muted);font-size:10px;letter-spacing:.12em;text-transform:uppercase}select,button,input[type=range]{width:100%}select,button{height:42px;border:1px solid var(--line);background:rgba(8,18,28,.92);color:var(--text);border-radius:12px;padding:0 12px;font-weight:650}button{cursor:pointer}button:hover{border-color:rgba(0,255,157,.55)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.legend{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;display:flex;gap:10px;align-items:center;padding:10px 12px;border:1px solid var(--line);border-radius:16px;background:var(--panel);z-index:3;backdrop-filter:blur(12px);max-width:65vw;overflow:hidden}.key{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:11px;white-space:nowrap}.sw{width:11px;height:11px;border-radius:3px}.notes{position:fixed;right:14px;bottom:14px;width:min(430px,36vw);max-height:112px;overflow:auto;padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:var(--panel);z-index:3;backdrop-filter:blur(12px);font-size:12px;line-height:1.45}.notes p{margin:0 0 8px}.chart{position:fixed;left:294px;bottom:14px;width:min(470px,35vw);height:82px;border:1px solid var(--line);border-radius:16px;background:var(--panel);z-index:3;backdrop-filter:blur(12px)}.tiny{color:var(--muted);font-size:11px;line-height:1.45}.focus .panel,.focus .legend,.focus .notes,.focus .chart{display:none}.focus .brand{opacity:.38}.focus .hud{opacity:.55}@media(max-width:900px){.panel{width:230px}.chart{display:none}.notes{width:calc(100vw - 28px);right:14px}.hud{top:74px;left:14px;right:auto}.stat{min-width:64px;padding:8px}.stat strong{font-size:16px}.legend{display:none}}
</style>
</head>
<body>
<canvas id="world"></canvas>
<div class="brand"><b>EMERGENCE LAB</b><span>v1.2 Recovery Ecology</span></div>
<div class="hud" id="hud"></div>
<aside class="panel" id="panel">
<h2>WORLD CONTROL</h2>
<div class="grid"><button id="pause">Pause</button><button id="step">Step</button></div>
<label>World Preset</label><select id="preset"><option value="balanced">Balanced Basin</option><option value="grassland">Grassland Recovery</option><option value="islands">Island Chain</option><option value="dry">Dry Savannah</option></select>
<div class="grid" style="margin-top:8px"><button id="newWorld">New World</button><button id="reset">Reset</button></div>
<label>Brush</label><select id="brush"><option value="plant">Plant</option><option value="herb">Herbivore</option><option value="pred">Predator</option><option value="water">Water</option><option value="soil">Nutrients</option><option value="erase">Erase Life</option></select>
<label>Brush Size <span id="brushVal">6</span></label><input id="brushSize" type="range" min="1" max="30" value="6" />
<label>Speed <span id="speedVal">6</span></label><input id="speed" type="range" min="1" max="20" value="6" />
<label>Climate Stress <span id="stressVal">18</span></label><input id="stress" type="range" min="0" max="80" value="18" />
<div class="grid" style="margin-top:12px"><button id="rain">Rain</button><button id="drought">Drought</button><button id="seedLife">Seed Life</button><button id="focus">Focus</button></div>
<label>Export</label><div class="grid"><button id="png">PNG</button><button id="save">Save</button></div>
<p class="tiny">Shortcuts: Space pause, S step, P panel, F focus, R rain, L seed life. Click/drag to paint.</p>
</aside>
<canvas class="chart" id="chart" width="470" height="82"></canvas>
<div class="legend"><span class="key"><i class="sw" style="background:#1667b7"></i>water</span><span class="key"><i class="sw" style="background:#4b3b2b"></i>land</span><span class="key"><i class="sw" style="background:#00d46a"></i>plants</span><span class="key"><i class="sw" style="background:#ffe066"></i>herbivores</span><span class="key"><i class="sw" style="background:#ff4778"></i>predators</span><span class="key">P panel · F focus</span></div>
<div class="notes" id="notes"></div>
<script>
const canvas=document.getElementById('world'),ctx=canvas.getContext('2d');
const chart=document.getElementById('chart'),cctx=chart.getContext('2d');
const W=260,H=150,N=W*H;let scale=4,paused=false,day=0,seed=Date.now()%999999,mouse=false;
let terrain=new Uint8Array(N),water=new Float32Array(N),nutr=new Float32Array(N),plants=new Float32Array(N),herbs=[],preds=[],history=[],notes=[];
const ui={hud:document.getElementById('hud'),panel:document.getElementById('panel'),preset:document.getElementById('preset'),brush:document.getElementById('brush'),brushSize:document.getElementById('brushSize'),speed:document.getElementById('speed'),stress:document.getElementById('stress')};
function rnd(){seed=(seed*1664525+1013904223)>>>0;return seed/4294967296}function idx(x,y){return ((y+H)%H)*W+((x+W)%W)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function smoothNoise(x,y){let v=0,a=1,s=0;for(let o=0;o<5;o++){let nx=Math.floor(x/(18/(o+1))),ny=Math.floor(y/(18/(o+1)));let n=Math.sin(nx*12.9898+ny*78.233+seed*.001)*43758.5453;n=n-Math.floor(n);v+=n*a;s+=a;a*=.5}return v/s}
function newWorld(){day=0;herbs=[];preds=[];history=[];notes=[];terrain.fill(0);water.fill(0);nutr.fill(0);plants.fill(0);const preset=ui.preset.value;for(let y=0;y<H;y++)for(let x=0;x<W;x++){let i=idx(x,y);let cx=(x-W/2)/(W/2),cy=(y-H/2)/(H/2);let island=1-Math.sqrt(cx*cx+cy*cy)*.9;let n=smoothNoise(x,y);let landScore=n*.55+island*.65;if(preset==='grassland')landScore+=.18;if(preset==='islands')landScore-=.06;if(preset==='dry')landScore+=.1;terrain[i]=landScore>.38?1:0;water[i]=terrain[i]?clamp(.18+n*.2,0,.55):1;nutr[i]=terrain[i]?(.35+rnd()*.45):0;if(terrain[i]&&water[i]>.18&&rnd()<(preset==='dry'?.10:.24))plants[i]=.35+rnd()*.55}
seedLife();log('New world generated with buffered starting populations.');}
function seedLife(){for(let k=0;k<180;k++)spawnHerb(Math.floor(rnd()*W),Math.floor(rnd()*H));for(let k=0;k<18;k++)spawnPred(Math.floor(rnd()*W),Math.floor(rnd()*H));for(let k=0;k<500;k++){let x=Math.floor(rnd()*W),y=Math.floor(rnd()*H),i=idx(x,y);if(terrain[i])plants[i]=Math.max(plants[i],.5+rnd()*.5)}log('Life seeded: herbivores and predators added with predator cap protection.');}
function spawnHerb(x,y){let i=idx(x,y);if(!terrain[i])return false;herbs.push({x,y,e:55+rnd()*25,age:0,repr:80+rnd()*80,spd:.7+rnd()*.5,vision:5+rnd()*4});return true}
function spawnPred(x,y){let i=idx(x,y);if(!terrain[i])return false;preds.push({x,y,e:75+rnd()*35,age:0,repr:420+rnd()*260,cool:0,spd:.75+rnd()*.35,vision:6+rnd()*5});return true}
function cellBestAround(x,y,score){let bx=x,by=y,bs=-1e9;for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){let xx=(x+dx+W)%W,yy=(y+dy+H)%H,i=idx(xx,yy),s=score(i,xx,yy)+rnd()*.03;if(s>bs){bs=s;bx=xx;by=yy}}return [bx,by]}
function stepWorld(){day++;let stress=+ui.stress.value/1000; // ecology
 for(let y=0;y<H;y++)for(let x=0;x<W;x++){let i=idx(x,y);if(!terrain[i])continue;let rain=.0018-stress*.001+Math.max(0,Math.sin(day/180))*0.001;water[i]=clamp(water[i]+rain-(plants[i]*.0012),.02,.9);nutr[i]=clamp(nutr[i]+.00025-(plants[i]*.0007),0,1);let grow=water[i]*nutr[i]*.035-stress*.004;if(plants[i]>0||rnd()<water[i]*nutr[i]*.003){plants[i]=clamp(plants[i]+grow+rnd()*.006,0,1)}if(plants[i]>.78&&rnd()<.03){let j=idx(x+Math.floor(rnd()*7)-3,y+Math.floor(rnd()*7)-3);if(terrain[j])plants[j]=Math.max(plants[j],.18)}}
 herbs=herbs.filter(a=>a.e>0&&a.age<1800);preds=preds.filter(a=>a.e>0&&a.age<2400);
 for(const h of herbs){h.age++;h.e-=.18;let [nx,ny]=cellBestAround(h.x,h.y,(i)=>plants[i]*2+water[i]*.3+(terrain[i]?0:-5));h.x=nx;h.y=ny;let i=idx(h.x,h.y);if(plants[i]>.03){let eat=Math.min(plants[i],.08);plants[i]-=eat;h.e+=eat*42}if(h.e>95&&h.repr--<0&&herbs.length<950){h.e*=.62;h.repr=90+rnd()*120;spawnHerb(h.x+Math.floor(rnd()*5)-2,h.y+Math.floor(rnd()*5)-2)} }
 for(const p of preds){p.age++;p.e-=.26;p.cool=Math.max(0,p.cool-1);let target=null,bd=999;for(const h of herbs){let dx=Math.abs(h.x-p.x),dy=Math.abs(h.y-p.y);let d=dx+dy;if(d<p.vision&&d<bd){bd=d;target=h}}let [nx,ny]=target?cellBestAround(p.x,p.y,(i,x,y)=>-Math.abs(x-target.x)-Math.abs(y-target.y)+water[i]*-.4):cellBestAround(p.x,p.y,(i)=>terrain[i]?water[i]*.2:-4);p.x=nx;p.y=ny;if(target&&p.cool===0&&Math.abs(target.x-p.x)<=1&&Math.abs(target.y-p.y)<=1){let cover=plants[idx(target.x,target.y)];let success=.48-cover*.28+(p.e>70?.08:0);if(rnd()<success){target.e=0;p.e+=46;p.cool=55+Math.floor(rnd()*55);nutr[idx(target.x,target.y)]+=0.12}else{p.e-=5;p.cool=25}}if(p.e>135&&p.repr--<0&&preds.length<Math.max(8,herbs.length/18)){p.e*=.68;p.repr=520+rnd()*420;spawnPred(p.x+Math.floor(rnd()*5)-2,p.y+Math.floor(rnd()*5)-2)}}
 if(herbs.length<35&&day%80===0)for(let k=0;k<35;k++)spawnHerb(Math.floor(rnd()*W),Math.floor(rnd()*H));
 if(preds.length<4&&herbs.length>120&&day%160===0)for(let k=0;k<3;k++)spawnPred(Math.floor(rnd()*W),Math.floor(rnd()*H));
 if(day%18===0){history.push({p:sum(plants),h:herbs.length,r:preds.length});if(history.length>180)history.shift()} if(day%120===0)observe();}
function sum(arr){let s=0;for(let i=0;i<arr.length;i++)s+=arr[i];return Math.round(s)}
function observe(){let p=sum(plants),h=herbs.length,r=preds.length;let msg;if(h===0&&r===0)msg='Recovery protocol active: life will reseed when the system collapses.';else if(r>h/8)msg='Predator pressure is high. Hunting failure, rest cycles and vegetation cover are limiting total collapse.';else if(h>p/5)msg='Grazing pressure is high. Plant recovery depends on rainfall and nutrient return.';else if(p>9000&&h<150)msg='Plant biomass is high. Herbivore expansion is likely if predation stays moderate.';else msg='Energy is cycling through plants, grazers, predators and nutrients.';log(`Day ${day} — ${msg}`)}
function log(t){notes.unshift(t);notes=notes.slice(0,8);document.getElementById('notes').innerHTML=notes.map(n=>`<p>${n}</p>`).join('')}
function draw(){resize();let img=ctx.createImageData(W,H);for(let y=0;y<H;y++)for(let x=0;x<W;x++){let i=idx(x,y),o=i*4;let r=4,g=8,b=12;if(!terrain[i]){r=10;g=58+water[i]*60;b=120+water[i]*105}else{r=48+nutr[i]*35;g=42+nutr[i]*26;b=30;if(water[i]>.55){r=18;g=70;b=115}if(plants[i]>.02){r=5+plants[i]*10;g=75+plants[i]*170;b=45+plants[i]*45}}img.data[o]=r;img.data[o+1]=g;img.data[o+2]=b;img.data[o+3]=255}for(const h of herbs){let o=idx(h.x,h.y)*4;img.data[o]=255;img.data[o+1]=224;img.data[o+2]=90}for(const p of preds){let o=idx(p.x,p.y)*4;img.data[o]=255;img.data[o+1]=58;img.data[o+2]=110}let off=document.createElement('canvas');off.width=W;off.height=H;off.getContext('2d').putImageData(img,0,0);ctx.imageSmoothingEnabled=false;ctx.drawImage(off,0,0,canvas.width,canvas.height);drawHUD();drawChart();}
function drawHUD(){ui.hud.innerHTML=[['DAY',day],['PLANTS',sum(plants)],['HERB',herbs.length],['PRED',preds.length],['NUTRIENTS',sum(nutr)]].map(s=>`<div class=stat><strong>${s[1]}</strong><small>${s[0]}</small></div>`).join('')}
function drawChart(){cctx.clearRect(0,0,chart.width,chart.height);cctx.strokeStyle='rgba(255,255,255,.12)';for(let y=20;y<82;y+=20){cctx.beginPath();cctx.moveTo(0,y);cctx.lineTo(470,y);cctx.stroke()}let max=Math.max(1,...history.map(v=>Math.max(v.p/20,v.h,v.r*10)));function line(key,col,scale=1){cctx.strokeStyle=col;cctx.beginPath();history.forEach((v,i)=>{let x=i/(179)*470,y=78-(v[key]*scale/max)*70;if(i)cctx.lineTo(x,y);else cctx.moveTo(x,y)});cctx.stroke()}line('p','#00d46a',1/20);line('h','#ffe066',1);line('r','#ff4778',10)}
function resize(){let dpr=window.devicePixelRatio||1,w=innerWidth*dpr,h=innerHeight*dpr;if(canvas.width!==w||canvas.height!==h){canvas.width=w;canvas.height=h}}
function paint(e){let rect=canvas.getBoundingClientRect();let x=Math.floor((e.clientX-rect.left)/rect.width*W),y=Math.floor((e.clientY-rect.top)/rect.height*H),bs=+ui.brushSize.value,b=ui.brush.value;for(let yy=-bs;yy<=bs;yy++)for(let xx=-bs;xx<=bs;xx++){if(xx*xx+yy*yy>bs*bs)return;let i=idx(x+xx,y+yy);if(b==='plant'&&terrain[i])plants[i]=1;if(b==='water')water[i]=.9;if(b==='soil'&&terrain[i])nutr[i]=1;if(b==='erase'){plants[i]=0} }if(b==='herb')for(let k=0;k<bs*4;k++)spawnHerb(x+Math.floor(rnd()*bs*2)-bs,y+Math.floor(rnd()*bs*2)-bs);if(b==='pred')for(let k=0;k<bs;k++)spawnPred(x+Math.floor(rnd()*bs*2)-bs,y+Math.floor(rnd()*bs*2)-bs)}
canvas.onmousedown=e=>{mouse=true;paint(e)};canvas.onmouseup=()=>mouse=false;canvas.onmousemove=e=>{if(mouse)paint(e)};
document.getElementById('pause').onclick=()=>paused=!paused;document.getElementById('step').onclick=()=>stepWorld();document.getElementById('newWorld').onclick=()=>{seed=Date.now()%999999;newWorld()};document.getElementById('reset').onclick=newWorld;document.getElementById('seedLife').onclick=seedLife;document.getElementById('rain').onclick=()=>{for(let i=0;i<N;i++)if(terrain[i])water[i]=clamp(water[i]+.25,0,1);log('Rain event added water across land cells.')};document.getElementById('drought').onclick=()=>{for(let i=0;i<N;i++)water[i]*=.65;log('Drought event reduced surface water.')};document.getElementById('focus').onclick=()=>document.body.classList.toggle('focus');document.getElementById('png').onclick=()=>{let a=document.createElement('a');a.download='emergence-lab-world.png';a.href=canvas.toDataURL();a.click()};document.getElementById('save').onclick=()=>{localStorage.setItem('emergence-lab-v12',JSON.stringify({day,seed,herbs,preds}));log('Light save stored in browser localStorage.')};ui.brushSize.oninput=()=>brushVal.textContent=ui.brushSize.value;ui.speed.oninput=()=>speedVal.textContent=ui.speed.value;ui.stress.oninput=()=>stressVal.textContent=ui.stress.value;window.onkeydown=e=>{if(e.code==='Space')paused=!paused;if(e.key==='s')stepWorld();if(e.key==='p')ui.panel.classList.toggle('hidden');if(e.key==='f')document.body.classList.toggle('focus');if(e.key==='r')document.getElementById('rain').click();if(e.key==='l')seedLife()};
newWorld();function loop(){let steps=paused?0:+ui.speed.value;for(let i=0;i<steps;i++)stepWorld();draw();requestAnimationFrame(loop)}loop();
</script>
</body></html>
