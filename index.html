<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Emergence Lab v1.0</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div id="app">
    <aside id="panel" class="panel">
      <div class="brand">
        <div class="mark"></div>
        <div><h1>Emergence Lab</h1><p>v1.0 Artificial World Observatory</p></div>
      </div>
      <section>
        <label>World preset</label>
        <select id="preset">
          <option value="temperate">Temperate Basin</option>
          <option value="desert">Drylands</option>
          <option value="islands">Island Chain</option>
          <option value="ice">Cold Frontier</option>
          <option value="chaos">Mutation Garden</option>
        </select>
      </section>
      <section class="grid2">
        <button id="newWorld">New World</button>
        <button id="pause">Pause</button>
        <button id="step">Step</button>
        <button id="focus">Focus</button>
      </section>
      <section>
        <label>Brush</label>
        <select id="brush">
          <option value="plant">Plant</option>
          <option value="water">Water</option>
          <option value="stone">Stone</option>
          <option value="herbivore">Herbivore</option>
          <option value="predator">Predator</option>
          <option value="erase">Erase</option>
        </select>
        <label>Brush size <span id="brushSizeLabel">5</span></label>
        <input id="brushSize" type="range" min="1" max="24" value="5" />
      </section>
      <section>
        <label>Simulation speed <span id="speedLabel">1x</span></label>
        <input id="speed" type="range" min="0" max="6" value="2" />
        <label>Mutation <span id="mutationLabel">1.0%</span></label>
        <input id="mutation" type="range" min="0" max="80" value="10" />
      </section>
      <section class="grid2">
        <button id="rain">Rain</button>
        <button id="drought">Drought</button>
        <button id="meteor">Meteor</button>
        <button id="mutate">Mutation</button>
      </section>
      <section class="grid2">
        <button id="save">Save</button>
        <button id="load">Load</button>
        <button id="shot">PNG</button>
        <button id="export">Export</button>
      </section>
      <section class="legend">
        <div><i class="ocean"></i>Water</div><div><i class="land"></i>Land</div>
        <div><i class="plant"></i>Plants</div><div><i class="herb"></i>Herbivores</div>
        <div><i class="pred"></i>Predators</div><div><i class="stone"></i>Stone</div>
      </section>
      <section class="help">
        <strong>Keys</strong> Space pause · F focus · P panel · S save · L load · R rain · M meteor · 1–6 brush · wheel zoom · drag pan
      </section>
    </aside>

    <main class="stage">
      <canvas id="world"></canvas>
      <canvas id="mini"></canvas>
      <div id="hud" class="hud">
        <div><span>Day</span><b id="day">0</b></div>
        <div><span>Plants</span><b id="plants">0</b></div>
        <div><span>Herbivores</span><b id="herbs">0</b></div>
        <div><span>Predators</span><b id="preds">0</b></div>
        <div><span>Temp</span><b id="temp">0°</b></div>
        <div><span>Rain</span><b id="rainVal">0%</b></div>
        <div><span>Diversity</span><b id="diversity">0</b></div>
      </div>
      <div id="observer" class="observer"><h2>AI Naturalist</h2><div id="notes"></div></div>
      <div id="timeline" class="timeline"><canvas id="chart"></canvas></div>
      <div id="toast" class="toast"></div>
    </main>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
